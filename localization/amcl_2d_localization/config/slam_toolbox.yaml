slam_toolbox:
  ros__parameters:
    use_sim_time: false

    # Plugin params
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # Frames
    odom_frame: "odom"
    map_frame: "map"
    base_frame: "base_footprint"

    # Laser input
    scan_topic: "/scan_outdoor"

    mode: mapping

    resolution: 0.05
    max_laser_range: 60.0          # increased for Velodyne VLP-32C outdoor range
    minimum_time_interval: 0.3

    transform_timeout: 0.3
    tf_buffer_duration: 60.0

    # Movement thresholds before adding a new scan
    minimum_travel_distance: 0.15
    minimum_travel_heading: 0.15

    # Scan buffering
    scan_buffer_size: 60
    scan_buffer_maximum_scan_distance: 20.0

    # Scan-to-map matching distances (larger for outdoor)
    link_scan_maximum_distance: 15.0
    loop_search_maximum_distance: 20.0

    # Correlation search
    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.02
    correlation_search_space_smear_deviation: 0.05

    # Loop closure
    do_loop_closing: true
    loop_match_minimum_chain_size: 8
    loop_match_minimum_response_coarse: 0.5
    loop_match_minimum_response_fine: 0.45

    # Scan matcher
    distance_variance_penalty: 0.5
    angle_variance_penalty: 0.2

    use_scan_matching: true
    use_scan_barycenter: true
    use_response_expansion: false

    enable_interactive_mode: true
